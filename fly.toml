# Fly.io app config. Deployed by .github/workflows/ci.yml on push to main.
# One-time setup (app creation, deploy token) is documented in DEPLOYMENT.md.

app = "sensor-manager-nullpointer84"
primary_region = "arn" # Stockholm

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle — costs nothing between visits. "suspend" snapshots
  # RAM so the Fly proxy resumes the machine in ~1 s on the next request (vs the
  # ~15 s JVM cold boot that "stop" would cost). Best-effort: Fly occasionally
  # falls back to a full stop, in which case the next request pays the JVM boot.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/actuator/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
